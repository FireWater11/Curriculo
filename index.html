<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Curriculo</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Znamenny+Musical+Notation&display=swap" rel="stylesheet">
    </head>
    <body>
        <section>
            <nav id="sidebar">
                <img id="imagem-perfil" src="Imagens/foto-provisoria.png" alt="foto-perfil">
                <ul id="sidebar-ul">
                    <li id="logo-start" class="logo">
                        <img id="imagem-git" class="icon" src="Imagens/foto-github.png" alt="foto-github">
                        <span class="tooltip">GitHub</span>
                    </li>
                    <li id="logo-mid" class="logo">
                        <img id="imagem-whats" class="icon" src="Imagens/foto-whats.png" alt="foto-whats">
                        <span class="tooltip">WhatsApp</span>
                    </li>
                    <li id="logo-end" class="logo">
                        <img id="imagem-linkedin" class="icon" src="Imagens/foto-linkedin.png" alt="foto-linkedin">
                        <span class="tooltip">LinkedIn</span>
                    </li>
                </ul>

                <button id="button">
                    BAIXAR CV
                </button>
            </nav>
        </section>

        <section>
            <header>
                <div id="box">
                    <nav id="navbar">
                        <ul id="navbar-ul">
                            <li id="start-flex-bar">SOBRE MIM</li>
                            <li>EDUCAÇÃO</li>
                            <li>PROJETOS</li>
                        </ul>
                    </nav>
                </div>
            </header>

            <div id="container">
                <div id="titulo">Atuo nas áreas de:</div>
                
                <ul id="subtitulo"  >
                    <li><span>Dev Back-End</span></li>
                    <li><span>Dev Front-End</span></li>
                    <li><span>UI/UX Designer</span></li>
                    <li><span>Banco de Dados</span></li>    
                    <li><span>Web Developer</span></li>
                </ul>
            </div>
        </section>

        <script src="main.js"></script>
    </body>
</html>
